<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国象棋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0f0a;
    font-family: 'KaiTi', '楷体', 'SimSun', '宋体', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 20px;
  }

  .title {
    font-size: 28px;
    color: #d4a843;
    text-shadow: 0 0 10px rgba(212,168,67,0.4);
    letter-spacing: 8px;
    font-weight: bold;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 6px 18px;
    background: rgba(139,90,43,0.15);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .turn-indicator {
    font-size: 16px;
    color: #e8d5a3;
  }

  .turn-indicator .red { color: #e74c3c; font-weight: bold; }
  .turn-indicator .black { color: #2c2c2c; font-weight: bold; text-shadow: 0 0 4px rgba(255,255,255,0.5); }

  .board-wrapper {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .captured-panel {
    width: 60px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .captured-label {
    font-size: 12px;
    color: #a89070;
    margin-bottom: 4px;
  }

  .captured-piece {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    border: 1px solid rgba(212,168,67,0.3);
    background: rgba(30,20,10,0.8);
  }

  .captured-piece.red { color: #e74c3c; }
  .captured-piece.black { color: #555; }

  /* 棋盘容器 */
  .board-container {
    position: relative;
    background: #c8a870;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 40px rgba(139,90,43,0.1);
    user-select: none;
    -webkit-user-select: none;
  }

  .board-svg {
    display: block;
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }

  /* 棋子 */
  .piece {
    position: absolute;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
    font-family: 'KaiTi', '楷体', 'SimSun', '宋体', serif;
    transition: transform 0.1s;
    transform: translate(-50%, -50%);
  }

  .piece.red {
    color: #c0392b;
    background: radial-gradient(circle at 35% 35%, #ffeebb, #d4a050);
    border: 2px solid #6b3a1b;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.4);
  }

  .piece.black {
    color: #2c3e50;
    background: radial-gradient(circle at 35% 35%, #ffeebb, #d4a050);
    border: 2px solid #6b3a1b;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.4);
  }

  .piece:hover {
    transform: translate(-50%, -50%) scale(1.05);
  }

  .piece.selected {
    box-shadow: 0 0 0 3px #f1c40f, 2px 2px 8px rgba(0,0,0,0.5);
    transform: translate(-50%, -50%) scale(1.08);
    z-index: 20;
  }

  .piece.in-check {
    box-shadow: 0 0 0 3px #e74c3c, 0 0 12px rgba(231,76,60,0.6);
    z-index: 20;
  }

  /* 走法提示 */
  .move-dot {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(46,204,113,0.5);
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
  }

  .capture-ring {
    position: absolute;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 3px solid rgba(231,76,60,0.7);
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
  }

  /* 上一步标记 */
  .last-move-marker {
    position: absolute;
    width: 56px;
    height: 56px;
    border: 2px solid rgba(241,196,15,0.6);
    border-radius: 4px;
    transform: translate(-50%, -50%);
    z-index: 1;
    pointer-events: none;
  }

  .controls {
    display: flex;
    gap: 10px;
  }

  .controls button, .mode-select button {
    padding: 8px 20px;
    background: linear-gradient(180deg, #8b5a2b, #6b3a1b);
    color: #e8d5a3;
    border: 1px solid #d4a843;
    border-radius: 4px;
    font-size: 14px;
    font-family: 'KaiTi', '楷体', serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .controls button:hover, .mode-select button:hover {
    background: linear-gradient(180deg, #a86a3b, #8b5a2b);
    box-shadow: 0 0 8px rgba(212,168,67,0.4);
  }

  .mode-select {
    display: flex;
    gap: 12px;
  }

  .mode-select button {
    padding: 6px 14px;
    font-size: 13px;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: linear-gradient(135deg, #2a1a0a, #1a0f0a);
    border: 2px solid #d4a843;
    border-radius: 12px;
    padding: 30px 40px;
    text-align: center;
    box-shadow: 0 0 30px rgba(212,168,67,0.3);
  }

  .modal h2 {
    font-size: 28px;
    color: #d4a843;
    margin-bottom: 12px;
    letter-spacing: 4px;
  }

  .modal p {
    font-size: 18px;
    color: #e8d5a3;
    margin-bottom: 20px;
  }

  .modal button {
    padding: 10px 30px;
    background: linear-gradient(180deg, #8b5a2b, #6b3a1b);
    color: #e8d5a3;
    border: 1px solid #d4a843;
    border-radius: 6px;
    font-size: 16px;
    font-family: 'KaiTi', '楷体', serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal button:hover {
    background: linear-gradient(180deg, #a86a3b, #8b5a2b);
  }

  .thinking-indicator {
    font-size: 14px;
    color: #d4a843;
    height: 20px;
  }
  /* 音乐控制 */
  .music-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 12px;
    background: rgba(139,90,43,0.12);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 6px;
  }

  .music-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid #d4a843;
    background: linear-gradient(180deg, #8b5a2b, #6b3a1b);
    color: #e8d5a3;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    padding: 0;
    line-height: 1;
  }

  .music-btn:hover {
    background: linear-gradient(180deg, #a86a3b, #8b5a2b);
    box-shadow: 0 0 8px rgba(212,168,67,0.4);
  }

  .music-btn.playing {
    box-shadow: 0 0 12px rgba(212,168,67,0.5);
  }

  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 70px;
    height: 4px;
    border-radius: 2px;
    background: rgba(212,168,67,0.3);
    outline: none;
    cursor: pointer;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #d4a843;
    cursor: pointer;
    box-shadow: 0 0 4px rgba(0,0,0,0.3);
  }

  .volume-slider::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #d4a843;
    cursor: pointer;
    border: none;
  }

  .music-label {
    font-size: 12px;
    color: #a89070;
    white-space: nowrap;
  }

</style>
</head>
<body>

<div class="game-container">
  <div class="title">中 国 象 棋</div>

  <div class="status-bar">
    <div class="turn-indicator" id="turnIndicator">
      <span class="red">红方</span> 走棋
    </div>
    <div class="mode-select" id="modeSelect">
      <button onclick="setMode('pvp')">双人对弈</button>
      <button onclick="setMode('ai-red')">电脑执红</button>
      <button onclick="setMode('ai-black')">电脑执黑</button>
    </div>
  </div>

  <div class="board-wrapper">
    <div class="captured-panel" id="capturedBlack">
      <div class="captured-label">被吃黑子</div>
    </div>
    <div class="board-container" id="boardContainer">
      <!-- SVG board lines will be inserted by JS -->
    </div>
    <div class="captured-panel" id="capturedRed">
      <div class="captured-label">被吃红子</div>
    </div>
  </div>

  <div class="thinking-indicator" id="thinkingIndicator"></div>

  
  <div class="controls">
    <button onclick="undoMove()">悔 棋</button>
    <button onclick="resetGame()">重新开始</button>
    <div class="music-controls">
      <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="背景音乐">&#9835;</button>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="30" oninput="setVolume(this.value)" title="音量">
      <button class="music-btn" id="sfxBtn" onclick="toggleSfx()" title="落子音效">&#128264;</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="gameOverModal">
  <div class="modal">
    <h2 id="modalTitle">对局结束</h2>
    <p id="modalMessage"></p>
    <button onclick="closeModal(); resetGame();">再来一局</button>
  </div>
</div>

<script>
// ============================================================
//  中国象棋 - DOM渲染版本
// ============================================================

// 棋盘尺寸配置
const COLS = 9, ROWS = 10;
const CELL = 62;
const PAD = 40;
const PIECE_R = 26;
const BOARD_W = PAD * 2 + CELL * (COLS - 1);
const BOARD_H = PAD * 2 + CELL * (ROWS - 1);

const boardContainer = document.getElementById('boardContainer');
boardContainer.style.width = BOARD_W + 'px';
boardContainer.style.height = BOARD_H + 'px';

// 游戏状态
let board = [];
let currentPlayer = 'red';
let selectedPiece = null;
let legalMoves = [];
let moveHistory = [];
let gameOver = false;
let gameMode = 'pvp';
let aiThinking = false;
let capturedRed = [];
let capturedBlack = [];
let inCheck = false;
let lastMove = null;

// 棋子名称映射
const PIECE_NAMES = {
  red:   { king:'帅', advisor:'仕', bishop:'相', knight:'马', rook:'车', cannon:'炮', pawn:'兵' },
  black: { king:'将', advisor:'士', bishop:'象', knight:'马', rook:'车', cannon:'炮', pawn:'卒' }
};

// ============================================================
//  绘制棋盘SVG（仅画线和文字）
// ============================================================
function drawBoardSVG() {
  let svg = '';
  svg += '<svg class="board-svg" width="' + BOARD_W + '" height="' + BOARD_H + '" xmlns="http://www.w3.org/2000/svg">';

  // 木纹效果线
  for (let i = 0; i < BOARD_H; i += 3) {
    const y = i + Math.sin(i * 0.05) * 2;
    svg += '<line x1="0" y1="' + y + '" x2="' + BOARD_W + '" y2="' + y + '" stroke="rgba(139,90,43,0.12)" stroke-width="0.5"/>';
  }

  // 外框
  svg += '<rect x="' + (PAD - 15) + '" y="' + (PAD - 15) + '" width="' + (CELL * 8 + 30) + '" height="' + (CELL * 9 + 30) + '" fill="none" stroke="#4a2a0a" stroke-width="3"/>';

  // 横线
  for (let r = 0; r < ROWS; r++) {
    svg += '<line x1="' + PAD + '" y1="' + (PAD + r * CELL) + '" x2="' + (PAD + 8 * CELL) + '" y2="' + (PAD + r * CELL) + '" stroke="#4a2a0a" stroke-width="1.2"/>';
  }

  // 竖线（上半部分 row 0-4）
  for (let c = 0; c < COLS; c++) {
    svg += '<line x1="' + (PAD + c * CELL) + '" y1="' + PAD + '" x2="' + (PAD + c * CELL) + '" y2="' + (PAD + 4 * CELL) + '" stroke="#4a2a0a" stroke-width="1.2"/>';
  }

  // 竖线（下半部分 row 5-9）
  for (let c = 0; c < COLS; c++) {
    svg += '<line x1="' + (PAD + c * CELL) + '" y1="' + (PAD + 5 * CELL) + '" x2="' + (PAD + c * CELL) + '" y2="' + (PAD + 9 * CELL) + '" stroke="#4a2a0a" stroke-width="1.2"/>';
  }

  // 楚河汉界文字
  const riverY = PAD + 4.5 * CELL;
  svg += '<text x="' + (PAD + 2 * CELL) + '" y="' + riverY + '" text-anchor="middle" dominant-baseline="middle" font-size="22" font-weight="bold" fill="#4a2a0a" font-family="KaiTi,楷体,SimSun,serif">楚 河</text>';
  svg += '<text x="' + (PAD + 6 * CELL) + '" y="' + riverY + '" text-anchor="middle" dominant-baseline="middle" font-size="22" font-weight="bold" fill="#4a2a0a" font-family="KaiTi,楷体,SimSun,serif">汉 界</text>';

  // 九宫格斜线 - 上方
  svg += '<line x1="' + (PAD + 3 * CELL) + '" y1="' + PAD + '" x2="' + (PAD + 5 * CELL) + '" y2="' + (PAD + 2 * CELL) + '" stroke="#4a2a0a" stroke-width="1.2"/>';
  svg += '<line x1="' + (PAD + 5 * CELL) + '" y1="' + PAD + '" x2="' + (PAD + 3 * CELL) + '" y2="' + (PAD + 2 * CELL) + '" stroke="#4a2a0a" stroke-width="1.2"/>';

  // 九宫格斜线 - 下方
  svg += '<line x1="' + (PAD + 3 * CELL) + '" y1="' + (PAD + 7 * CELL) + '" x2="' + (PAD + 5 * CELL) + '" y2="' + (PAD + 9 * CELL) + '" stroke="#4a2a0a" stroke-width="1.2"/>';
  svg += '<line x1="' + (PAD + 5 * CELL) + '" y1="' + (PAD + 7 * CELL) + '" x2="' + (PAD + 3 * CELL) + '" y2="' + (PAD + 9 * CELL) + '" stroke="#4a2a0a" stroke-width="1.2"/>';

  // 炮和兵位置标记
  const markPositions = [[2,1],[2,7],[7,1],[7,7]];
  for (let c = 0; c < 9; c += 2) markPositions.push([3,c]);
  for (let c = 0; c < 9; c += 2) markPositions.push([6,c]);

  const len = 6, gap = 3;
  markPositions.forEach(function(mc) {
    const r = mc[0], c = mc[1];
    const x = PAD + c * CELL;
    const y = PAD + r * CELL;
    var dirs = [];
    if (c > 0) { dirs.push([-1, -1]); dirs.push([-1, 1]); }
    if (c < 8) { dirs.push([1, -1]); dirs.push([1, 1]); }
    dirs.forEach(function(d) {
      var dx = d[0], dy = d[1];
      svg += '<line x1="' + (x + dx * gap) + '" y1="' + (y + dy * gap) + '" x2="' + (x + dx * (gap + len)) + '" y2="' + (y + dy * gap) + '" stroke="#4a2a0a" stroke-width="1"/>';
      svg += '<line x1="' + (x + dx * gap) + '" y1="' + (y + dy * gap) + '" x2="' + (x + dx * gap) + '" y2="' + (y + dy * (gap + len)) + '" stroke="#4a2a0a" stroke-width="1"/>';
    });
  });

  svg += '</svg>';
  boardContainer.innerHTML = svg;
}

// ============================================================
//  渲染棋子（DOM元素）
// ============================================================
function renderPieces() {
  // 移除所有旧棋子和标记
  var oldPieces = boardContainer.querySelectorAll('.piece, .move-dot, .capture-ring, .last-move-marker');
  for (var i = 0; i < oldPieces.length; i++) {
    oldPieces[i].parentNode.removeChild(oldPieces[i]);
  }

  // 上一步标记
  if (lastMove) {
    addMarker(lastMove.from.row, lastMove.from.col, 'last-move-marker');
    addMarker(lastMove.to.row, lastMove.to.col, 'last-move-marker');
  }

  // 棋子
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (board[r][c]) {
        addPiece(r, c, board[r][c]);
      }
    }
  }

  // 走法提示
  legalMoves.forEach(function(m) {
    var x = PAD + m.col * CELL;
    var y = PAD + m.row * CELL;
    if (board[m.row][m.col]) {
      // 可吃子 - 圆环
      var ring = document.createElement('div');
      ring.className = 'capture-ring';
      ring.style.left = x + 'px';
      ring.style.top = y + 'px';
      boardContainer.appendChild(ring);
    } else {
      // 可走 - 小圆点
      var dot = document.createElement('div');
      dot.className = 'move-dot';
      dot.style.left = x + 'px';
      dot.style.top = y + 'px';
      boardContainer.appendChild(dot);
    }
  });
}

function addMarker(r, c, className) {
  var x = PAD + c * CELL;
  var y = PAD + r * CELL;
  var marker = document.createElement('div');
  marker.className = className;
  marker.style.left = x + 'px';
  marker.style.top = y + 'px';
  boardContainer.appendChild(marker);
}

function addPiece(r, c, piece) {
  var x = PAD + c * CELL;
  var y = PAD + r * CELL;

  var el = document.createElement('div');
  el.className = 'piece ' + piece.color;

  if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) {
    el.classList.add('selected');
  }

  // 将军标记
  if (inCheck && piece.type === 'king' && piece.color === currentPlayer) {
    el.classList.add('in-check');
  }

  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.textContent = PIECE_NAMES[piece.color][piece.type];

  // 点击事件
  el.addEventListener('click', (function(row, col) {
    return function(e) {
      e.stopPropagation();
      handleBoardClick(row, col);
    };
  })(r, c));

  boardContainer.appendChild(el);
}

// ============================================================
//  完整渲染
// ============================================================
function render() {
  renderPieces();
}

// ============================================================
//  规则引擎
// ============================================================

function inBounds(r, c) {
  return r >= 0 && r < ROWS && c >= 0 && c < COLS;
}

function inPalace(r, c, color) {
  if (c < 3 || c > 5) return false;
  if (color === 'red') return r >= 7 && r <= 9;
  return r >= 0 && r <= 2;
}

function inOwnHalf(r, c, color) {
  if (color === 'red') return r >= 5 && r <= 9;
  return r >= 0 && r <= 4;
}

function crossedRiver(r, color) {
  if (color === 'red') return r <= 4;
  return r >= 5;
}

function pseudoMoves(r, c, b) {
  var piece = b[r][c];
  if (!piece) return [];

  var moves = [];
  var color = piece.color;
  var enemy = color === 'red' ? 'black' : 'red';

  switch (piece.type) {
    case 'king': {
      var dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (var i = 0; i < dirs.length; i++) {
        var nr = r + dirs[i][0], nc = c + dirs[i][1];
        if (inPalace(nr, nc, color) && (!b[nr][nc] || b[nr][nc].color === enemy)) {
          moves.push({row: nr, col: nc});
        }
      }
      break;
    }

    case 'advisor': {
      var dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
      for (var i = 0; i < dirs.length; i++) {
        var nr = r + dirs[i][0], nc = c + dirs[i][1];
        if (inPalace(nr, nc, color) && (!b[nr][nc] || b[nr][nc].color === enemy)) {
          moves.push({row: nr, col: nc});
        }
      }
      break;
    }

    case 'bishop': {
      var dirs = [[2,2],[2,-2],[-2,2],[-2,-2]];
      for (var i = 0; i < dirs.length; i++) {
        var dr = dirs[i][0], dc = dirs[i][1];
        var nr = r + dr, nc = c + dc;
        var eyeR = r + dr/2, eyeC = c + dc/2;
        if (inBounds(nr, nc) && inOwnHalf(nr, nc, color) && !b[eyeR][eyeC] && (!b[nr][nc] || b[nr][nc].color === enemy)) {
          moves.push({row: nr, col: nc});
        }
      }
      break;
    }

    case 'knight': {
      var knightMoves = [
        [-2, -1, -1, 0], [-2, 1, -1, 0],
        [2, -1, 1, 0], [2, 1, 1, 0],
        [-1, -2, 0, -1], [-1, 2, 0, 1],
        [1, -2, 0, -1], [1, 2, 0, 1]
      ];
      for (var i = 0; i < knightMoves.length; i++) {
        var km = knightMoves[i];
        var nr = r + km[0], nc = c + km[1];
        var blockR = r + km[2], blockC = c + km[3];
        if (inBounds(nr, nc) && !b[blockR][blockC] && (!b[nr][nc] || b[nr][nc].color === enemy)) {
          moves.push({row: nr, col: nc});
        }
      }
      break;
    }

    case 'rook': {
      var dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (var i = 0; i < dirs.length; i++) {
        var dr = dirs[i][0], dc = dirs[i][1];
        var nr = r + dr, nc = c + dc;
        while (inBounds(nr, nc)) {
          if (!b[nr][nc]) {
            moves.push({row: nr, col: nc});
          } else {
            if (b[nr][nc].color === enemy) moves.push({row: nr, col: nc});
            break;
          }
          nr += dr;
          nc += dc;
        }
      }
      break;
    }

    case 'cannon': {
      var dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (var i = 0; i < dirs.length; i++) {
        var dr = dirs[i][0], dc = dirs[i][1];
        var nr = r + dr, nc = c + dc;
        var jumped = false;
        while (inBounds(nr, nc)) {
          if (!jumped) {
            if (!b[nr][nc]) {
              moves.push({row: nr, col: nc});
            } else {
              jumped = true;
            }
          } else {
            if (b[nr][nc]) {
              if (b[nr][nc].color === enemy) moves.push({row: nr, col: nc});
              break;
            }
          }
          nr += dr;
          nc += dc;
        }
      }
      break;
    }

    case 'pawn': {
      if (color === 'red') {
        if (r - 1 >= 0 && (!b[r-1][c] || b[r-1][c].color === enemy)) moves.push({row: r-1, col: c});
        if (crossedRiver(r, color)) {
          if (c - 1 >= 0 && (!b[r][c-1] || b[r][c-1].color === enemy)) moves.push({row: r, col: c-1});
          if (c + 1 < COLS && (!b[r][c+1] || b[r][c+1].color === enemy)) moves.push({row: r, col: c+1});
        }
      } else {
        if (r + 1 < ROWS && (!b[r+1][c] || b[r+1][c].color === enemy)) moves.push({row: r+1, col: c});
        if (crossedRiver(r, color)) {
          if (c - 1 >= 0 && (!b[r][c-1] || b[r][c-1].color === enemy)) moves.push({row: r, col: c-1});
          if (c + 1 < COLS && (!b[r][c+1] || b[r][c+1].color === enemy)) moves.push({row: r, col: c+1});
        }
      }
      break;
    }
  }

  return moves;
}

function kingsExposed(b) {
  var redKing = null, blackKing = null;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (b[r][c] && b[r][c].type === 'king') {
        if (b[r][c].color === 'red') redKing = {r: r, c: c};
        else blackKing = {r: r, c: c};
      }
    }
  }
  if (!redKing || !blackKing) return false;
  if (redKing.c !== blackKing.c) return false;

  var minR = Math.min(redKing.r, blackKing.r);
  var maxR = Math.max(redKing.r, blackKing.r);
  for (var r = minR + 1; r < maxR; r++) {
    if (b[r][redKing.c]) return false;
  }
  return true;
}

function isInCheck(color, b) {
  var kingPos = null;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (b[r][c] && b[r][c].type === 'king' && b[r][c].color === color) {
        kingPos = {r: r, c: c};
        break;
      }
    }
    if (kingPos) break;
  }
  if (!kingPos) return true;

  var enemy = color === 'red' ? 'black' : 'red';

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (b[r][c] && b[r][c].color === enemy) {
        var moves = pseudoMoves(r, c, b);
        for (var i = 0; i < moves.length; i++) {
          if (moves[i].row === kingPos.r && moves[i].col === kingPos.c) {
            return true;
          }
        }
      }
    }
  }

  if (kingsExposed(b)) return true;

  return false;
}

function allLegalMoves(color, b) {
  var moves = [];
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (b[r][c] && b[r][c].color === color) {
        var pMoves = pseudoMoves(r, c, b);
        for (var i = 0; i < pMoves.length; i++) {
          var m = pMoves[i];
          var captured = b[m.row][m.col];
          b[m.row][m.col] = b[r][c];
          b[r][c] = null;

          if (!isInCheck(color, b)) {
            moves.push({from: {row: r, col: c}, to: m});
          }

          b[r][c] = b[m.row][m.col];
          b[m.row][m.col] = captured;
        }
      }
    }
  }
  return moves;
}

// ============================================================
//  走棋逻辑
// ============================================================

function getLegalMovesForPiece(r, c) {
  var piece = board[r][c];
  if (!piece || piece.color !== currentPlayer) return [];

  var pMoves = pseudoMoves(r, c, board);
  var legal = [];

  for (var i = 0; i < pMoves.length; i++) {
    var m = pMoves[i];
    var captured = board[m.row][m.col];
    board[m.row][m.col] = board[r][c];
    board[r][c] = null;

    if (!isInCheck(currentPlayer, board)) {
      legal.push(m);
    }

    board[r][c] = board[m.row][m.col];
    board[m.row][m.col] = captured;
  }

  return legal;
}

function makeMove(fromR, fromC, toR, toC) {
  var piece = board[fromR][fromC];
  var captured = board[toR][toC];

  moveHistory.push({
    from: {row: fromR, col: fromC},
    to: {row: toR, col: toC},
    piece: piece,
    captured: captured
  });

  if (captured) {
    if (captured.color === 'red') capturedRed.push(captured);
    else capturedBlack.push(captured);
  }

  board[toR][toC] = piece;
  board[fromR][fromC] = null;

  lastMove = {from: {row: fromR, col: fromC}, to: {row: toR, col: toC}};

  currentPlayer = currentPlayer === 'red' ? 'black' : 'red';

  inCheck = isInCheck(currentPlayer, board);

  if (captured) { playCaptureSound(); } else { playMoveSound(); }
  if (inCheck) { playCheckSound(); }

  var opponentMoves = allLegalMoves(currentPlayer, board);
  if (opponentMoves.length === 0) {
    gameOver = true;
    var winner = currentPlayer === 'red' ? '黑方' : '红方';
    var reason = inCheck ? '将杀' : '困毙';
    showModal(winner + '胜！', '对方' + reason + '，' + winner + '获胜！');
  }

  updateCaptured();
  updateTurnIndicator();
  render();

  if (!gameOver && gameMode !== 'pvp' && isAITurn()) {
    aiThinking = true;
    document.getElementById('thinkingIndicator').textContent = '电脑思考中...';
    setTimeout(function() {
      aiMove();
      aiThinking = false;
      document.getElementById('thinkingIndicator').textContent = '';
    }, 300);
  }
}

function isAITurn() {
  if (gameMode === 'ai-red') return currentPlayer === 'red';
  if (gameMode === 'ai-black') return currentPlayer === 'black';
  return false;
}

var BLACK_PAWN_POS = RED_PAWN_POS.slice().reverse();

// 获取棋子位置价值
function getPosValue(piece, r, c) {
  switch(piece.type) {
    case 'rook':   return ROOK_POS[r][c];
    case 'knight': return KNIGHT_POS[r][c];
    case 'cannon': return CANNON_POS[r][c];
    case 'pawn':   return piece.color === 'red' ? RED_PAWN_POS[r][c] : BLACK_PAWN_POS[r][c];
    default:       return 0;
  }
}

// 快速评估函数
function evaluateBoard(b) {
  var score = 0;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (b[r][c]) {
        var p = b[r][c];
        var val = PIECE_VALUES[p.type] + getPosValue(p, r, c);
        score += (p.color === 'red') ? val : -val;
      }
    }
  }
  return score;
}

// 快速评估单步走法
function evaluateQuick(b, fromR, fromC, toR, toC) {
  var piece = b[fromR][fromC];
  var captured = b[toR][toC];
  var enemy = piece.color === 'red' ? 'black' : 'red';
  var score = 0;

  // 1. 吃子得分（最重要）
  if (captured) {
    score += PIECE_VALUES[captured.type] * 2;
  }

  // 2. 位置得分变化
  score += getPosValue(piece, toR, toC) - getPosValue(piece, fromR, fromC);

  // 3. 执行走棋后检查
  b[toR][toC] = piece;
  b[fromR][fromC] = null;

  // 4. 是否被将军
  if (isInCheck(piece.color, b)) {
    score -= 500; // 自己被将，大减分
  }

  // 5. 是否将军对方
  if (isInCheck(enemy, b)) {
    score += 300; // 将军对方，大加分
  }

  // 6. 对方能否吃掉我（安全性检查）
  if (!captured || captured.type !== 'king') {
    var enemyMoves = pseudoMovesAll(b, enemy);
    for (var i = 0; i < enemyMoves.length; i++) {
      if (enemyMoves[i].toR === toR && enemyMoves[i].toC === toC) {
        // 我的棋子可以被吃掉
        score -= PIECE_VALUES[piece.type] * 1.5;
        break;
      }
    }
  }

  // 还原
  b[fromR][fromC] = piece;
  b[toR][toC] = captured;

  return score;
}

// 获取某方所有伪合法走法（不做合法性检查，速度快）
function pseudoMovesAll(b, color) {
  var moves = [];
  var enemy = color === 'red' ? 'black' : 'red';

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (b[r][c] && b[r][c].color === color) {
        var pMoves = pseudoMoves(r, c, b);
        for (var i = 0; i < pMoves.length; i++) {
          moves.push({
            fromR: r, fromC: c,
            toR: pMoves[i].row, toC: pMoves[i].col
          });
        }
      }
    }
  }
  return moves;
}

// AI 主函数
function aiMove() {
  if (gameOver) return;

  var aiColor = currentPlayer;
  var enemy = aiColor === 'red' ? 'black' : 'red';
  var moves = allLegalMoves(aiColor, board);

  if (moves.length === 0) return;

  // 只有一步棋直接走
  if (moves.length === 1) {
    makeMove(moves[0].from.row, moves[0].from.col, moves[0].to.row, moves[0].to.col);
    return;
  }

  var bestScore = -Infinity;
  var bestMoves = [];

  for (var i = 0; i < moves.length; i++) {
    var m = moves[i];
    var score = evaluateQuick(board, m.from.row, m.from.col, m.to.row, m.to.col);

    // 加入少量随机性
    score += (Math.random() - 0.5) * 3;

    if (score > bestScore) {
      bestScore = score;
      bestMoves = [m];
    } else if (score === bestScore) {
      bestMoves.push(m);
    }
  }

  var chosen = bestMoves[Math.floor(Math.random() * bestMoves.length)];
  makeMove(chosen.from.row, chosen.from.col, chosen.to.row, chosen.to.col);
}
//  交互 - 棋盘点击（点击空白交叉点走棋）
// ============================================================

boardContainer.addEventListener('click', function(e) {
  if (gameOver || aiThinking) return;
  if (isAITurn()) return;

  // 如果点击的是棋子，棋子自己的事件已经处理了
  // 这里处理点击棋盘空白区域
  if (e.target.classList && e.target.classList.contains('piece')) return;

  var rect = boardContainer.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;

  var col = Math.round((mx - PAD) / CELL);
  var row = Math.round((my - PAD) / CELL);

  if (!inBounds(row, col)) return;

  handleBoardClick(row, col);
});

function handleBoardClick(row, col) {
  if (gameOver || aiThinking) return;
  if (isAITurn()) return;

  if (selectedPiece) {
    // 尝试走棋
    var move = null;
    for (var i = 0; i < legalMoves.length; i++) {
      if (legalMoves[i].row === row && legalMoves[i].col === col) {
        move = legalMoves[i];
        break;
      }
    }
    if (move) {
      makeMove(selectedPiece.row, selectedPiece.col, row, col);
      selectedPiece = null;
      legalMoves = [];
      render();
      return;
    }

    // 点击自己的棋子重新选择
    if (board[row][col] && board[row][col].color === currentPlayer) {
      selectedPiece = {row: row, col: col};
      legalMoves = getLegalMovesForPiece(row, col);
      render();
      return;
    }

    // 取消选择
    selectedPiece = null;
    legalMoves = [];
    render();
    return;
  }

  // 选择棋子
  if (board[row][col] && board[row][col].color === currentPlayer) {
    selectedPiece = {row: row, col: col};
    legalMoves = getLegalMovesForPiece(row, col);
    render();
  }
}

// ============================================================

function initBoard() {
  board = Array.from({length: ROWS}, function() { return Array(COLS).fill(null); });

  var backRow = ['rook','knight','bishop','advisor','king','advisor','bishop','knight','rook'];

  // 黑方 (上方, row 0-4)
  for (var c = 0; c < 9; c++) {
    board[0][c] = {color:'black', type: backRow[c]};
    if (c === 1 || c === 7) board[2][c] = {color:'black', type:'cannon'};
    if (c % 2 === 0) board[3][c] = {color:'black', type:'pawn'};
  }

  // 红方 (下方, row 5-9)
  for (var c = 0; c < 9; c++) {
    board[9][c] = {color:'red', type: backRow[c]};
    if (c === 1 || c === 7) board[7][c] = {color:'red', type:'cannon'};
    if (c % 2 === 0) board[6][c] = {color:'red', type:'pawn'};
  }
}

// ============================================================
//  悔棋
// ============================================================

function undoMove() {
  if (moveHistory.length === 0 || gameOver) return;
  var steps = (gameMode !== 'pvp' && moveHistory.length >= 2) ? 2 : 1;

  for (var i = 0; i < steps && moveHistory.length > 0; i++) {
    var last = moveHistory.pop();
    board[last.from.row][last.from.col] = last.piece;
    board[last.to.row][last.to.col] = last.captured;

    if (last.captured) {
      if (last.captured.color === 'red') capturedRed.pop();
      else capturedBlack.pop();
    }

    currentPlayer = last.piece.color;
  }

  if (moveHistory.length > 0) {
    var prev = moveHistory[moveHistory.length - 1];
    lastMove = {from: prev.from, to: prev.to};
  } else {
    lastMove = null;
  }

  inCheck = isInCheck(currentPlayer, board);
  gameOver = false;
  selectedPiece = null;
  legalMoves = [];

  updateCaptured();
  updateTurnIndicator();
  render();
}

// ============================================================

function resetGame() {
  initBoard();
  currentPlayer = 'red';
  selectedPiece = null;
  legalMoves = [];
  moveHistory = [];
  gameOver = false;
  inCheck = false;
  lastMove = null;
  capturedRed = [];
  capturedBlack = [];
  aiThinking = false;
  document.getElementById('thinkingIndicator').textContent = '';

  updateCaptured();
  updateTurnIndicator();
  render();
}

function setMode(mode) {
  gameMode = mode;
  resetGame();
}

  if (ctx.state === 'suspended') ctx.resume();

  // 主振荡器 - 基频
  var osc1 = ctx.createOscillator();
  osc1.type = 'triangle';
  osc1.frequency.value = freq;

  // 泛音 - 模拟弦乐谐波
  var osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;

  var osc3 = ctx.createOscillator();
  osc3.type = 'sine';
  osc3.frequency.value = freq * 3;

  // 包络
  var envGain = ctx.createGain();
  envGain.gain.setValueAtTime(0, startTime);
  envGain.gain.linearRampToValueAtTime(volume, startTime + 0.02);
  envGain.gain.exponentialRampToValueAtTime(volume * 0.6, startTime + 0.1);
  envGain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

  // 泛音增益
  var harm2Gain = ctx.createGain();
  harm2Gain.gain.value = 0.15 * volume;
  var harm3Gain = ctx.createGain();
  harm3Gain.gain.value = 0.08 * volume;

  // 滤波器 - 柔化音色
  var filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 2000;
  filter.Q.value = 1;

  // 连接
  osc1.connect(envGain);
  osc2.connect(harm2Gain);
  osc3.connect(harm3Gain);
  harm2Gain.connect(envGain);
  harm3Gain.connect(envGain);
  envGain.connect(filter);
  filter.connect(musicGainNode);

  osc1.start(startTime);
  osc2.start(startTime);
  osc3.start(startTime);
  osc1.stop(startTime + duration + 0.1);
  osc2.stop(startTime + duration + 0.1);
  osc3.stop(startTime + duration + 0.1);
}

// 模拟琵琶伴奏音（低音拨弦）
function playPipaNote(freq, startTime, duration, volume) {
  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  var osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = freq * 0.5;

  var envGain = ctx.createGain();
  envGain.gain.setValueAtTime(0, startTime);
  envGain.gain.linearRampToValueAtTime(volume * 0.3, startTime + 0.01);
  envGain.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.7);

  var filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 800;
  filter.Q.value = 2;

  osc.connect(envGain);
  envGain.connect(filter);
  filter.connect(musicGainNode);

  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}

function startMusic() {
  if (musicPlaying) return;

  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  musicPlaying = true;
  musicGainNode = ctx.createGain();
  musicGainNode.gain.value = musicVolume;
  musicGainNode.connect(ctx.destination);

  currentPattern = 0;
  currentNoteInPattern = 0;
  playNextPhrase();

  document.getElementById('musicBtn').classList.add('playing');
}

function playNextPhrase() {
  if (!musicPlaying) return;

  var pattern = MELODY_PATTERNS[currentPattern];
  var noteIndex = currentNoteInPattern;
  var note = pattern.notes[noteIndex];
  var durMultiplier = pattern.durations[noteIndex];
  var ctx = getAudioCtx();
  var now = ctx.currentTime;
  var noteDuration = durMultiplier * 0.55;

  // 播放旋律音
  if (note >= 0 && note < PENTATONIC_FREQS.length) {
    playGuzhengNote(PENTATONIC_FREQS[note], now, noteDuration * 1.5, 0.35);
  }

  // 偶尔加伴奏低音
  if (noteIndex % 3 === 0 && note > 2) {
    playPipaNote(PENTATONIC_FREQS[note - 2], now, noteDuration * 2, 0.2);
  }

  // 轻微的颤音效果
  if (noteIndex === pattern.notes.length - 1) {
    setTimeout(function() {
      if (!musicPlaying) return;
      // 乐句结束加一个余音
      var nextNote = pattern.notes[0];
      if (nextNote < PENTATONIC_FREQS.length) {
        playGuzhengNote(PENTATONIC_FREQS[nextNote] * 0.5, ctx.currentTime, 1.0, 0.15);
      }
    }, noteDuration * 600);
  }

  currentNoteInPattern++;
  if (currentNoteInPattern >= pattern.notes.length) {
    currentNoteInPattern = 0;
    currentPattern = (currentPattern + 1) % MELODY_PATTERNS.length;
  }

  // 下一个音符的间隔
  var nextDelay = noteDuration * 1000;
  if (noteIndex === pattern.notes.length - 1) {
    nextDelay *= 2.5; // 乐句间长停顿
  }

  patternTimer = setTimeout(function() {
    playNextPhrase();
  }, nextDelay);
}

function stopMusic() {
  musicPlaying = false;
  if (patternTimer) {
    clearTimeout(patternTimer);
    patternTimer = null;
  }
  if (musicGainNode) {
    musicGainNode.disconnect();
    musicGainNode = null;
  }
  document.getElementById('musicBtn').classList.remove('playing');
}

function toggleMusic() {
  if (musicPlaying) {
    stopMusic();
  } else {
    startMusic();
  }
}

function setVolume(val) {
  musicVolume = val / 100;
  if (musicGainNode) {
    musicGainNode.gain.value = musicVolume;
  }
}

// ============================================================
//  落子音效
// ============================================================

function playMoveSound() {
  if (!sfxEnabled) return;
  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  var now = ctx.currentTime;
  var sfxGain = ctx.createGain();
  sfxGain.gain.value = sfxVolume;
  sfxGain.connect(ctx.destination);

  // 落子声 - 短促清脆
  var osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, now);
  osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);

  var env = ctx.createGain();
  env.gain.setValueAtTime(sfxVolume, now);
  env.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

  var filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 600;
  filter.Q.value = 3;

  osc.connect(env);
  env.connect(filter);
  filter.connect(sfxGain);

  osc.start(now);
  osc.stop(now + 0.12);

  // 模拟木头碰撞声
  var noise = ctx.createBufferSource();
  var bufferSize = ctx.sampleRate * 0.05;
  var noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  var output = noiseBuffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) {
    output[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
  }
  noise.buffer = noiseBuffer;

  var noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(sfxVolume * 0.4, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);

  var noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 1200;
  noiseFilter.Q.value = 1;

  noise.connect(noiseGain);
  noiseGain.connect(noiseFilter);
  noiseFilter.connect(sfxGain);

  noise.start(now);
  noise.stop(now + 0.06);
}

function playCaptureSound() {
  if (!sfxEnabled) return;
  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  var now = ctx.currentTime;
  var sfxGain = ctx.createGain();
  sfxGain.gain.value = sfxVolume;
  sfxGain.connect(ctx.destination);

  // 吃子声 - 更有力
  var osc = ctx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(600, now);
  osc.frequency.exponentialRampToValueAtTime(150, now + 0.12);

  var env = ctx.createGain();
  env.gain.setValueAtTime(sfxVolume * 0.8, now);
  env.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

  osc.connect(env);
  env.connect(sfxGain);

  osc.start(now);
  osc.stop(now + 0.18);

  // 双击效果
  setTimeout(function() {
    var osc2 = ctx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.value = 400;
    var env2 = ctx.createGain();
    env2.gain.setValueAtTime(sfxVolume * 0.5, ctx.currentTime);
    env2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc2.connect(env2);
    env2.connect(ctx.destination);
    osc2.start(ctx.currentTime);
    osc2.stop(ctx.currentTime + 0.1);
  }, 60);
}

function playCheckSound() {
  if (!sfxEnabled) return;
  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  var now = ctx.currentTime;
  var sfxGain = ctx.createGain();
  sfxGain.gain.value = sfxVolume;
  sfxGain.connect(ctx.destination);

  // 将军提示音 - 两声
  [0, 0.15].forEach(function(delay) {
    var osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 880;
    var env = ctx.createGain();
    env.gain.setValueAtTime(0, now + delay);
    env.gain.linearRampToValueAtTime(sfxVolume * 0.3, now + delay + 0.01);
    env.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.12);
    osc.connect(env);
    env.connect(sfxGain);
    osc.start(now + delay);
    osc.stop(now + delay + 0.15);
  });
}

function toggleSfx() {
  sfxEnabled = !sfxEnabled;
  var btn = document.getElementById('sfxBtn');
  btn.style.opacity = sfxEnabled ? '1' : '0.4';
  btn.title = sfxEnabled ? '落子音效 (开)' : '落子音效 (关)';
}

// ============================================================
//  启动
// ============================================================

drawBoardSVG();
resetGame();
